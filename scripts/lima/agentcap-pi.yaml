# Lima VM for the `pi` agent (pi-coding-agent npm package).
#
#   limactl start --name=agentcap-pi scripts/lima/agentcap-pi.yaml
#   limactl shell agentcap-pi
#   limactl stop  agentcap-pi

minimumLimaVersion: 2.0.0

base:
- template:ubuntu-24.04

cpus: 2
memory: "2GiB"
disk: "20GiB"

# `mounts: []` overrides the `~` mount inherited from ubuntu-24.04.
mounts: []

provision:
- mode: system
  script: |
    #!/bin/bash
    set -eux
    apt-get update
    apt-get install -y --no-install-recommends \
        ca-certificates curl python3 gnupg
    # pi-tui's regex uses ECMAScript 2024 `v` flag; Ubuntu's default
    # Node 18 chokes on it. Pin NodeSource's Node 20 LTS line.
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    apt-get install -y --no-install-recommends nodejs
- mode: user
  script: |
    #!/bin/bash
    set -eux
    sudo npm install -g --no-fund --no-audit \
        "@mariozechner/pi-coding-agent@0.73.0"
    command -v pi
    # /opt/pi-config is where the Containerfile bakes models.json;
    # mirror it so agentcap-init's sed path matches both backends.
    # Chown to this user so sed runs without sudo at run time.
    sudo mkdir -p /opt/pi-config/sessions
    sudo chown -R "$USER:$USER" /opt/pi-config
