# Lima VM for the `hermes` agent (Nous Research Hermes Agent CLI).
#
#   limactl start --name=agentcap-hermes scripts/lima/agentcap-hermes.yaml
#   limactl shell agentcap-hermes
#   limactl stop  agentcap-hermes
#
# TODO(install): user-mode step below is a placeholder. Hermes has no
# canonical curl-pipe installer; fill in the right flow before use.

minimumLimaVersion: 2.0.0

base:
- template:ubuntu-24.04

cpus: 2
memory: "4GiB"
disk: "30GiB"

# `mounts: []` overrides the `~` mount inherited from ubuntu-24.04.
mounts: []

provision:
- mode: system
  script: |
    #!/bin/bash
    set -eux
    apt-get update
    apt-get install -y --no-install-recommends \
        ca-certificates curl python3 python3-pip pipx
- mode: user
  script: |
    #!/bin/bash
    set -eux
    echo "ERROR: hermes install command not configured in agentcap-hermes.yaml" >&2
    exit 1
