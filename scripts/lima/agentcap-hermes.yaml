# Lima VM for the `hermes` agent (Nous Research Hermes Agent CLI).
#
#   limactl start --name=agentcap-hermes scripts/lima/agentcap-hermes.yaml
#   limactl shell agentcap-hermes
#   limactl stop  agentcap-hermes

minimumLimaVersion: 2.0.0

base:
- template:ubuntu-24.04

cpus: 2
memory: "4GiB"
disk: "30GiB"

# `mounts: []` overrides the `~` mount inherited from ubuntu-24.04.
mounts: []

provision:
- mode: system
  script: |
    #!/bin/bash
    set -eux
    apt-get update
    apt-get install -y --no-install-recommends \
        ca-certificates curl git \
        python3 python3-venv python3-pip
- mode: user
  script: |
    #!/bin/bash
    set -eux
    sudo git clone https://github.com/NousResearch/hermes-agent.git /opt/hermes
    sudo python3 -m venv /opt/hermes/venv
    sudo /opt/hermes/venv/bin/pip install --no-cache-dir -e "/opt/hermes[all]"
    sudo ln -sf /opt/hermes/venv/bin/hermes /usr/local/bin/hermes
    command -v hermes
    # Bootstrap ~/.hermes/ with the same config the Containerfile bakes.
    # hermes refuses startup if either context_length guard is < 64K.
    hermes --version >/dev/null
    hermes config set model.provider custom
    hermes config set model.base_url http://placeholder/v1
    hermes config set model.context_length 65536
    hermes config set auxiliary.compression.context_length 65536
    test -f "$HOME/.hermes/config.yaml"
