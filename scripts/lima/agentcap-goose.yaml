# Lima VM for the `goose` agent (Block's goose CLI).
#
#   limactl start --name=agentcap-goose scripts/lima/agentcap-goose.yaml
#   limactl shell agentcap-goose
#   limactl stop  agentcap-goose

minimumLimaVersion: 2.0.0

base:
- template:ubuntu-24.04

cpus: 2
memory: "2GiB"
disk: "20GiB"

# `mounts: []` overrides the `~` mount inherited from ubuntu-24.04.
mounts: []

provision:
- mode: system
  script: |
    #!/bin/bash
    set -eux
    apt-get update
    # goose binary links libgomp at runtime.
    apt-get install -y --no-install-recommends \
        ca-certificates curl python3 python3-pip bzip2 xz-utils libgomp1
- mode: user
  script: |
    #!/bin/bash
    set -eux
    # CONFIGURE=false skips goose's interactive provider wizard.
    curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh \
        | CONFIGURE=false bash
    install -d "$HOME/.local/bin"
