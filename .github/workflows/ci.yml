name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install trufflehog
        # Used by ``agentcap scan`` and the pre-export gate in
        # ``agentcap export``. ``tests/test_scan.py`` and the
        # scan-on parametrisation of ``tests/test_cli.py`` need it
        # on PATH; tests skip cleanly when it's absent.
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (unit only, no live)
        run: pytest -m "not live" tests/

  live:
    # End-to-end tests that touch a real model server, build per-agent
    # sandbox images, and run real agent CLIs. Runs after ``test``
    # passes; never blocks merges (continue-on-error) since the live
    # endpoint may be unreachable. Configure via repo secrets:
    #
    #   AGENTCAP_TEST_LLM_URL    OpenAI-compat ``/v1`` URL the
    #                            sandbox can reach (HF Router works).
    #   AGENTCAP_TEST_MODEL      Model id to send (e.g.
    #                            ``meta-llama/Llama-3.3-8B-Instruct``).
    #   HF_TOKEN                 For HF Router; the hermes init
    #                            picks it up automatically.
    #
    # When neither secret is set, the live fixtures skip everything
    # gracefully (no LLM endpoint → no tests run, job is green).
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install system deps (bwrap + buildah)
        # Required by ``agentcap.sandbox.bwrap``. Available in Ubuntu's
        # default apt sources on ``ubuntu-latest``.
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap buildah
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run live tests
        env:
          AGENTCAP_TEST_LLM_URL: ${{ secrets.AGENTCAP_TEST_LLM_URL }}
          AGENTCAP_TEST_MODEL: ${{ secrets.AGENTCAP_TEST_MODEL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: pytest -m live tests/ -v
