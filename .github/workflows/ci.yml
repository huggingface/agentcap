name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    # Single job so we install everything once. The live tests share
    # the same Python env, trufflehog binary, and pip cache as the
    # unit tests — no duplicated installs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install system deps (bwrap + buildah)
        # Required by the live tests' bwrap sandbox. Both ship in
        # Ubuntu's default apt sources on ``ubuntu-latest``.
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap buildah
      - name: Install trufflehog
        # Powers ``agentcap scan`` + the pre-export gate; required by
        # tests/test_scan.py and the scan-on parametrisation in
        # tests/test_cli.py.
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install llama
        # ``live_proxy_base_url`` invokes ``llama serve`` to spawn a
        # local model server for the live tests.
        run: |
          curl -fsSL https://llama.app/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cache GGUF weights
        # The default test GGUF (gemma-4-E4B-it Q4_K_M, ~5 GB) lands
        # in the HF hub cache. Caching it keeps live runs cheap after
        # the first download.
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-hub-gguf-${{ hashFiles('tests/conftest.py') }}
          restore-keys: |
            hf-hub-gguf-
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (unit only, no live)
        run: pytest -m "not live" tests/
      - name: Tests (live)
        # End-to-end tests that build per-agent sandbox images, spawn
        # ``llama serve``, and run real agent CLIs.
        # ``continue-on-error: true`` keeps merges unblocked while the
        # live setup stabilises.
        continue-on-error: true
        run: pytest -m live tests/ -v
