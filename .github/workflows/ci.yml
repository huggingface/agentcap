name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    # Lint + unit tests on the default Ubuntu runner. The live tests
    # live in ``ci-live.yml`` and run on a GPU runner so the local
    # ``llama serve`` doesn't stall on CPU inference.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install trufflehog
        # Powers ``agentcap scan`` + the pre-export gate; required by
        # tests/test_scan.py and the scan-on parametrisation in
        # tests/test_cli.py.
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (unit only, no live)
        run: pytest -m "not live" tests/
