name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install trufflehog
        # Used by ``agentcap scan`` and the pre-export gate in
        # ``agentcap export``. ``tests/test_scan.py`` and the
        # scan-on parametrisation of ``tests/test_cli.py`` need it
        # on PATH; tests skip cleanly when it's absent.
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (unit only, no live)
        run: pytest -m "not live" tests/

  live:
    # End-to-end tests that touch a real model server, build per-agent
    # sandbox images, and run real agent CLIs. Runs on every PR and on
    # push to main; ``continue-on-error: true`` keeps merges unblocked
    # while the live setup stabilises.
    #
    # Self-contained: installs llama (from llama.app) and lets the
    # ``live_proxy_base_url`` fixture fetch a small GGUF from HF Hub
    # and spawn ``llama serve`` locally. No external secrets needed.
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps (bwrap + buildah)
        # Required by ``agentcap.sandbox.bwrap``. Both are in Ubuntu's
        # default apt sources on ``ubuntu-latest``.
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap buildah
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install llama
        # Drops the ``llama`` binary in ~/.local/bin. The
        # ``live_proxy_base_url`` fixture invokes ``llama serve``.
        run: |
          curl -fsSL https://llama.app/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cache GGUF weights
        # The default test GGUF (gemma-4-E4B-it Q4_K_M, ~5 GB) lands
        # in the HF hub cache. Caching it keeps CI runs cheap after
        # the first download.
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-hub-gguf-${{ hashFiles('tests/conftest.py') }}
          restore-keys: |
            hf-hub-gguf-
      - name: Run live tests
        run: pytest -m live tests/ -v
