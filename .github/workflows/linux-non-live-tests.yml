name: linux-non-live-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    # Lint + unit tests on the default Ubuntu runner. The live tests
    # live in ``linux-live-tests.yml`` and run on a GPU runner so the
    # local ``llama serve`` doesn't stall on CPU inference.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install trufflehog
        # Powers ``agentcap scan`` + the pre-export gate; required by
        # tests/test_scan.py and the scan-on parametrisation in
        # tests/test_cli.py. Pinned so a trufflehog release that
        # changes detector output (more/fewer false positives) can't
        # silently break the scan-on tests.
        env:
          TRUFFLEHOG_VERSION: v3.95.3
        run: |
          curl -sSfL -o /tmp/install-trufflehog.sh https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh
          echo "4caf8178b5af8e5e5a8e3e4dbfea2e91cc5e750f38c1e2e635e28a1f3dbea50b  /tmp/install-trufflehog.sh" | sha256sum -c -
          sh /tmp/install-trufflehog.sh -b "$HOME/.local/bin" "$TRUFFLEHOG_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (unit only, no live)
        run: pytest -m "not live" tests/
